<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Security Engineer — Roadmap</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="topbar">
  <div class="topbar-brand">AI Security <span>Engineer</span></div>
  <div class="topbar-actions">
    <button class="topbar-btn" id="themeBtn" title="Alternar tema">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path class="sun" d="M12 3v1m0 16v1m-8-9H3m18 0h-1M5.6 5.6l.7.7m12.8-.7l-.7.7M5.6 18.4l.7-.7m12.8.7l-.7-.7M12 8a4 4 0 100 8 4 4 0 000-8z"/>
        <path class="moon" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" style="display:none"/>
      </svg>
    </button>
  </div>
</nav>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-text" id="progressText">0%</span>
</div>

<div class="layout">
  <div class="main" id="roadmap"></div>
  <aside class="panel" id="panel">
    <div class="panel-card">
      <div class="panel-empty">Seleciona um nó para ver detalhes</div>
    </div>
  </aside>
</div>

<script src="script.js"></script>
</body>
</html>
